name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  OTP_VERSION: '27.1.2'
  ELIXIR_VERSION: '1.17.3'

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Setup assets
        run: mix assets.setup

      - name: Compile
        run: mix compile

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run unit tests
        run: mix test.unit

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run integration tests
        run: mix test.integ
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run Credo
        run: mix credo --strict

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    env:
      MIX_ENV: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Build release
        run: |
          mix compile
          mix assets.deploy
          mix release

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: _build/prod/rel/daily_logos
          retention-days: 1

      - name: Save cache
        uses: actions/cache/save@v6
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: release
          path: _build/prod/rel/daily_logos

      - name: Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            @semantic-release/github

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download Terraform state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?name=terraform-state&per_page=1" \
            --jq '.artifacts[0].id // empty' 2>/dev/null)
          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > state.zip
            unzip -o state.zip -d ./terraform/
            rm state.zip
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.15"

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform init && terraform apply -auto-approve -input=false
        env:
          TF_VAR_app_name: daily-logos
          TF_VAR_image_tag: ${{ needs.release.outputs.image_tag }}
          TF_VAR_secret_key_base: ${{ secrets.SECRET_KEY_BASE }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_name: ${{ vars.CLOUDFLARE_ZONE_NAME }}
          TF_VAR_render_owner_id: ${{ vars.RENDER_OWNER_ID }}
          TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
          TF_VAR_render_plan: free
          TF_VAR_render_region: frankfurt
          TF_VAR_supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          TF_VAR_supabase_organization_id: ${{ vars.SUPABASE_ORGANIZATION_ID }}
          TF_VAR_supabase_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TF_VAR_supabase_region: eu-central-1
          TF_VAR_feedback_form_url: ${{ vars.FEEDBACK_FORM_URL }}
          TF_VAR_buy_me_coffee_url: ${{ vars.BUY_ME_COFFEE_URL }}

      - name: Upload Terraform state
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state
          path: ./terraform/terraform.tfstate
          retention-days: 90
          overwrite: true
