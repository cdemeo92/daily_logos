name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  OTP_VERSION: '27.1.2'
  ELIXIR_VERSION: '1.17.3'

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Setup assets
        run: mix assets.setup

      - name: Compile
        run: mix compile

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run unit tests
        run: mix test.unit

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run integration tests
        run: mix test.integ
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Run Credo
        run: mix credo --strict

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    env:
      MIX_ENV: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            assets/node_modules
          key: ${{ runner.os }}-${{ hashFiles('mix.lock', 'assets/package-lock.json') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Build release
        run: |
          mix compile
          mix assets.deploy
          mix release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: _build/prod/rel/daily_logos
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: _build/prod/rel/daily_logos

      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            @semantic-release/github

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=$(git describe --tags --abbrev=0 | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
