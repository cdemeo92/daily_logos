version: 2

multi-ecosystem-groups:
  app-dependencies:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    patterns:
      - "*"
    multi-ecosystem-group: "app-dependencies"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/assets"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    patterns:
      - "*"
    multi-ecosystem-group: "app-dependencies"
    labels:
      - "dependencies"
