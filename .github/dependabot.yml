version: 2

multi-ecosystem-groups:
  app-dependencies:
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 1

updates:
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Rome
    patterns:
      - "*"
    multi-ecosystem-group: "app-dependencies"
    labels:
      - dependencies

  - package-ecosystem: "npm"
    directory: "/assets"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Rome
    patterns:
      - "*"
    multi-ecosystem-group: "app-dependencies"
    labels:
      - dependencies